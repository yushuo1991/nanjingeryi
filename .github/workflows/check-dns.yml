name: 检查DNS解析

on:
  workflow_dispatch:

jobs:
  check-dns:
    runs-on: ubuntu-latest

    steps:
    - name: 从服务器检查DNS和外网IP
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          echo "========== 服务器公网IP =========="
          curl -s ifconfig.me || curl -s icanhazip.com

          echo ""
          echo "========== DNS解析 ey.yushuo.click =========="
          dig ey.yushuo.click A +short || nslookup ey.yushuo.click

          echo ""
          echo "========== Nginx监听的Host =========="
          grep -r "server_name" /etc/nginx/sites-enabled/ 2>/dev/null || grep -r "server_name" /etc/nginx/conf.d/ 2>/dev/null

          echo ""
          echo "========== 从外部访问域名 =========="
          curl -s -o /dev/null -w "HTTP状态码: %{http_code}\n" --connect-timeout 5 http://ey.yushuo.click/ || echo "连接失败"
