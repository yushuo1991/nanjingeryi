name: 紧急修复 - 强制重启服务

on:
  workflow_dispatch:

jobs:
  restart-server:
    runs-on: ubuntu-latest

    steps:
    - name: 强制清理并重启
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        command_timeout: 10m
        script: |
          echo "========== 1. 强制杀死所有 node 进程 =========="
          pkill -f "node.*index.js" || true
          pkill -f "pm2" || true
          sleep 3

          echo ""
          echo "========== 2. 清理 PM2 状态 =========="
          rm -rf ~/.pm2/daemon || true
          rm -rf ~/.pm2/dump.pm2 || true
          rm -rf ~/.pm2/pids || true
          rm -rf ~/.pm2/logs || true
          sleep 2

          echo ""
          echo "========== 3. 检查 server 目录 =========="
          ls -la /var/www/rehab-care-link/server/
          echo ""
          echo "node_modules 状态:"
          ls /var/www/rehab-care-link/server/node_modules/ | wc -l
          echo "个包"

          echo ""
          echo "========== 4. 检查关键依赖是否存在 =========="
          cd /var/www/rehab-care-link/server
          for pkg in multer busboy express better-sqlite3 cors jsonwebtoken; do
            if [ -d "node_modules/$pkg" ]; then
              echo "✅ $pkg"
            else
              echo "❌ $pkg 缺失，安装..."
              npm install $pkg --no-save 2>&1 | tail -3
            fi
          done

          echo ""
          echo "========== 5. 测试能否加载 index.js =========="
          node -e "
            process.env.PORT = '3201';
            try {
              // 只测试 require，不实际启动
              const m = require('./index.js');
              console.log('✅ index.js 加载成功');
            } catch(e) {
              console.error('❌ 加载失败:', e.message);
            }
          " 2>&1 | head -10

          echo ""
          echo "========== 6. 直接用 node 后台启动（绕过 PM2）=========="
          cd /var/www/rehab-care-link/server
          nohup node index.js > /var/log/rehab-direct.log 2>&1 &
          DIRECT_PID=$!
          echo "直接启动 PID: $DIRECT_PID"
          sleep 5

          echo ""
          echo "========== 7. 测试直接启动是否成功 =========="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3201/api/health)
          echo "健康检查 HTTP 状态码: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ 服务器直接启动成功！"
            echo "现在用 PM2 接管..."
            kill $DIRECT_PID 2>/dev/null || true
            sleep 2

            echo ""
            echo "========== 8. 用 PM2 启动 =========="
            cd /var/www/rehab-care-link/server
            PORT=3201 pm2 start index.js --name rehab-care-link-server --no-daemon &
            PM2_PID=$!
            sleep 8

            if curl -s http://localhost:3201/api/health | grep -q "ok"; then
              echo "✅ PM2 启动成功"
              pm2 save --force
            else
              echo "PM2 启动失败，保持直接运行..."
              nohup node index.js > /var/log/rehab-direct.log 2>&1 &
              sleep 5
              curl -s http://localhost:3201/api/health
            fi
          else
            echo "❌ 直接启动也失败了，查看日志："
            cat /var/log/rehab-direct.log | tail -30
          fi

          echo ""
          echo "========== 9. 最终测试 =========="
          sleep 3
          curl -s http://localhost:3201/api/health
          echo ""
          HTTP_REGEN=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3201/api/patients/1/regenerate-plan \
            -H "Content-Type: application/json" \
            -d '{"supplementNotes":"test","profile":{"patient":{"name":"test"},"risks":[],"contraindications":[],"monitoring":[],"keyFindings":[]}}')
          echo "regenerate-plan 状态码: $HTTP_REGEN"
          if [ "$HTTP_REGEN" != "404" ]; then
            echo "✅ 路由已注册！"
          else
            echo "❌ 路由仍未注册"
          fi

          echo ""
          echo "完成！"
